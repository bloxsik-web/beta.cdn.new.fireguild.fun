<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FireGuild</title>
<link rel="stylesheet" href="style.css">
<style>

</style>
</head>

<body>

<div class="auth" id="auth">
<div class="auth-box">
<h2>🔥 FireGuild</h2>
<input id="loginUser" placeholder="Username" autocomplete="username">
<input id="loginPass" type="password" placeholder="Password" autocomplete="current-password">
<button id="loginBtn">Войти</button>
<button id="registerBtn" class="register">Зарегистрироваться</button>
</div>
</div>

<div class="app" id="app">
<button class="menu-toggle" id="menuToggle">☰</button>

<div class="sidebar" id="sidebar">
<div class="user">
<div class="avatar" id="myAvatar">?</div>
<div class="user-info">
<span id="myName"></span>
</div>
<button class="logout-btn" id="logoutBtn">Выйти</button>
</div>
<div class="chat-search">
<input id="userSearchInput" placeholder="Найти пользователя по нику">
<button id="userSearchBtn">🔍</button>
</div>
<div class="chat-list" id="chatList"></div>
</div>

<div class="chat">
<div class="chat-header">
<button class="back-btn" id="backBtn">←</button>
<span id="chatTitle">Выберите чат</span>
</div>
<div class="messages" id="messages"></div>
<div class="input" id="chatInput" style="display:none">
<div id="msgInput" class="msg-input" contenteditable="true" lang="ru" placeholder="Сообщение..." autocomplete="off" inputmode="text"></div>
<button id="sendBtn">➤</button>
</div>
</div>
</div>



<script type="module" src="js/brain.js"></script>
</body>
</html>
